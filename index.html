<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selix Tuner Pro</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#2e2e2e;
    color:white;
    text-align:center;
}

/* Bienvenue */
#welcome {
    margin-top:150px;
}

button {
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#ff8f8f;
    color:white;
    cursor:pointer;
}

/* Menu */
#menu {
    display:none;
    margin-top:150px;
}

/* Tuner */
#tuner {
    display:none;
    margin-top:80px;
}

#note {
    font-size:90px;
    font-weight:bold;
}

#frequency {
    font-size:24px;
    margin-top:10px;
}

#cents {
    font-size:20px;
    margin-top:5px;
}

/* Barre de tuner */
#tunerBar {
    width:80%;
    height:30px;
    background:#555;
    margin:40px auto;
    border-radius:20px;
    position:relative;
}

#needle {
    width:6px;
    height:30px;
    background:red;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    transition:left 0.05s linear, background 0.1s;
}

#labels {
    width:80%;
    margin:auto;
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

/* Notes correctes */
#correctNotes {
    margin-top:30px;
    font-size:20px;
    min-height:30px;
}
.correct {
    color:lime;
    margin-right:10px;
    font-weight:bold;
}
</style>

</head>

<body>

<!-- Bienvenue -->
<div id="welcome">
    <h1>Acadie Tuner Pro</h1>
    <p>Application créée par Martin Duguay</p>
    <button id="startBtn">Commencer</button>
</div>

<!-- Menu -->
<div id="menu">
    <h2>Menu</h2>
    <button id="guitarBtn">🎸 Guitare</button>
</div>

<!-- Tuner -->
<div id="tuner">
    <h2>Tuner</h2>
    <div id="note">--</div>
    <div id="frequency">0 Hz</div>
    <div id="cents">-- cents</div>

    <div id="tunerBar">
        <div id="needle"></div>
    </div>

    <div id="labels">
        <span>Grave</span>
        <span>Parfait</span>
        <span>Aigu</span>
    </div>

    <!-- Notes correctes -->
    <div id="correctNotes"></div>
</div>

<script src="app.js"></script>
</body>
</html>
